<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Brand background: dark green circle -->
  <circle cx="32" cy="32" r="32" fill="#1F5440"/>

  <!-- House roof: inverted V outline with chimney -->
  <path d="M 11 25.5 L 32 11 L 53 25.5"
        stroke="#ECD2A3" stroke-width="2.8" fill="none"
        stroke-linejoin="round" stroke-linecap="round"/>
  <rect x="44" y="12.5" width="3.4" height="9.5" fill="#ECD2A3"/>

  <!-- Monogram "PP" — extra-bold display sans-serif -->
  <g fill="#ECD2A3" fill-rule="evenodd">
    <!-- First P -->
    <path d="M 12 29
             L 23 29
             A 7.5 7.5 0 0 1 23 44
             L 18 44
             L 18 54
             L 12 54
             Z
             M 18 33.5
             L 22 33.5
             A 3 3 0 0 1 22 39.5
             L 18 39.5
             Z"/>
    <!-- Second P -->
    <path d="M 33 29
             L 44 29
             A 7.5 7.5 0 0 1 44 44
             L 39 44
             L 39 54
             L 33 54
             Z
             M 39 33.5
             L 43 33.5
             A 3 3 0 0 1 43 39.5
             L 39 39.5
             Z"/>
  </g>
</svg>
